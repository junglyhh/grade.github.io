<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grade Cutoff Generator</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --ok-bg: #ecfdf5;
      --ok-border: #10b981;
      --bad-bg: #fef2f2;
      --bad-border: #ef4444;
      --warn-bg: #fffbeb;
      --warn-border: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #eef2ff, var(--bg));
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.10);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    .form-line {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 14px;
      align-items: start;
      margin-bottom: 16px;
    }

    label {
      font-weight: 700;
      padding-top: 10px;
    }

    select,
    textarea,
    button {
      width: 100%;
      font: inherit;
      border-radius: 12px;
    }

    select,
    textarea {
      border: 1px solid var(--border);
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 94px;
      resize: vertical;
      line-height: 1.5;
    }

    select:focus,
    textarea:focus {
      outline: 3px solid rgba(37, 99, 235, 0.16);
      border-color: var(--accent);
    }

    .button-row {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 14px;
      align-items: center;
      margin-top: 10px;
    }

    button {
      border: none;
      padding: 13px 18px;
      background: var(--accent);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    button:hover { background: var(--accent-dark); }
    button:active { transform: translateY(1px); }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
    }

    #result {
      margin-top: 26px;
    }

    .notice {
      border-left: 5px solid;
      border-radius: 12px;
      padding: 14px 16px;
      line-height: 1.5;
      margin: 12px 0;
    }

    .notice.ok {
      background: var(--ok-bg);
      border-color: var(--ok-border);
    }

    .notice.bad {
      background: var(--bad-bg);
      border-color: var(--bad-border);
    }

    .notice.warn {
      background: var(--warn-bg);
      border-color: var(--warn-border);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 16px 0 20px;
    }

    .summary-box {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fafafa;
    }

    .summary-box .big {
      font-size: 1.35rem;
      font-weight: 850;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      overflow: hidden;
      border-radius: 12px;
    }

    th,
    td {
      border: 1px solid #e5e7eb;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f3f4f6;
      font-weight: 800;
    }

    tr:nth-child(even) td { background: #fbfbfd; }

    code {
      background: #f3f4f6;
      border-radius: 6px;
      padding: 2px 5px;
    }

    @media (max-width: 720px) {
      .card { padding: 20px; }
      .form-line,
      .button-row {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      label { padding-top: 0; }
      .summary-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Grade Cutoff Generator</h1>
    <p class="subtitle">
      Enter the class scores, then generate one feasible set of integer grade cutoffs satisfying the percentage and spacing constraints.
    </p>

    <div class="form-line">
      <label for="courseType">Course type</label>
      <div>
        <select id="courseType" aria-label="Course type">
          <option value="">Select a course type</option>
          <option value="Undergraduate Course">Undergraduate Course</option>
          <option value="Graduate Course">Graduate Course</option>
        </select>
      </div>
    </div>

    <div class="form-line">
      <label for="scoresInput">Scores</label>
      <div>
        <textarea id="scoresInput" placeholder="Example: 92, 88, 81, 79, 73, 70, 66, 61, 58, 52, 47, 39"></textarea>
        <div class="hint">Use commas, spaces, semicolons, or new lines. Every score must be between 0 and 100.</div>
      </div>
    </div>

    <div class="button-row">
      <div></div>
      <button id="generateBtn" type="button">Generate</button>
    </div>

    <section id="result" aria-live="polite"></section>
  </main>

  <script>
    const gradeOrder = ["A+", "A", "A-", "B+", "B", "B-", "C+", "C", "D+", "D", "F"];

    document.getElementById("generateBtn").addEventListener("click", generateCutoffs);

    function generateCutoffs() {
      const result = document.getElementById("result");
      result.innerHTML = "";

      const courseType = document.getElementById("courseType").value;
      const rawScores = document.getElementById("scoresInput").value;

      if (!courseType) {
        showError("Please select Undergraduate Course or Graduate Course.");
        return;
      }

      const parsed = parseScores(rawScores);
      if (!parsed.ok) {
        showError(parsed.message);
        return;
      }

      const scores = parsed.scores;
      const solution = findFeasibleSolution(scores);

      if (!solution) {
        renderImpossible(scores, courseType);
        return;
      }

      renderSolution(scores, courseType, solution);
    }

    function parseScores(text) {
      const tokens = text.trim().split(/[\s,;]+/).filter(Boolean);

      if (tokens.length === 0) {
        return { ok: false, message: "Please enter at least one score." };
      }

      const scores = [];
      for (const token of tokens) {
        const value = Number(token);
        if (!Number.isFinite(value)) {
          return { ok: false, message: `Invalid score: “${escapeHtml(token)}”.` };
        }
        if (value < 0 || value > 100) {
          return { ok: false, message: `Score out of range: ${value}. Every score must be between 0 and 100.` };
        }
        scores.push(value);
      }

      return { ok: true, scores };
    }

    function findFeasibleSolution(scores) {
      const n = scores.length;
      const candidates = [];

      // A- is the boundary between the A group and B group.
      // B- is the boundary between the B group and lower group.
      // The remaining grade cutoffs are filled in after these two boundaries are chosen.
      for (let aMinus = 0; aMinus <= 94; aMinus++) {
        for (let bMinus = 42; bMinus <= aMinus - 9; bMinus++) {
          const aCount = scores.filter(score => score >= aMinus).length;
          const bCount = scores.filter(score => score >= bMinus && score < aMinus).length;
          const lowerCount = n - aCount - bCount;

          if (!withinPercent(aCount, n, 25, 45)) continue;
          if (!withinPercent(bCount, n, 40, 75)) continue;
          if (!withinPercent(lowerCount, n, 0, 15)) continue;

          const cutoffs = buildCutoffs(aMinus, bMinus);
          if (!cutoffs) continue;

          const aPct = percent(aCount, n);
          const bPct = percent(bCount, n);
          const lowerPct = percent(lowerCount, n);

          // Prefer percentages near the midpoints of the requested bands.
          // Tie-breakers prefer conventional-looking thresholds without affecting feasibility.
          const objective =
            Math.abs(aPct - 35) +
            Math.abs(bPct - 57.5) +
            Math.abs(lowerPct - 7.5) +
            0.01 * Math.abs(aMinus - 70) +
            0.01 * Math.abs(bMinus - 50);

          candidates.push({
            cutoffs,
            counts: { aCount, bCount, lowerCount },
            percentages: { aPct, bPct, lowerPct },
            objective
          });
        }
      }

      candidates.sort((x, y) => x.objective - y.objective);
      return candidates[0] || null;
    }

    function buildCutoffs(aMinus, bMinus) {
      const topGaps = balancedGaps(100 - aMinus, [3, 3, 0]);
      const middleGaps = balancedGaps(aMinus - bMinus, [3, 3, 3]);
      const lowerGaps = balancedGaps(bMinus - 30, [3, 3, 3, 3]);

      if (!topGaps || !middleGaps || !lowerGaps) return null;

      const a = aMinus + topGaps[0];
      const aPlus = a + topGaps[1];

      const b = bMinus + middleGaps[0];
      const bPlus = b + middleGaps[1];

      const d = 30;
      const dPlus = d + lowerGaps[0];
      const c = dPlus + lowerGaps[1];
      const cPlus = c + lowerGaps[2];

      const cutoffs = {
        "A+": aPlus,
        "A": a,
        "A-": aMinus,
        "B+": bPlus,
        "B": b,
        "B-": bMinus,
        "C+": cPlus,
        "C": c,
        "D+": dPlus,
        "D": d
      };

      return validCutoffs(cutoffs) ? cutoffs : null;
    }

    function balancedGaps(total, minimumGaps) {
      const minimumTotal = minimumGaps.reduce((sum, value) => sum + value, 0);
      if (total < minimumTotal) return null;

      const gaps = [...minimumGaps];
      let remaining = total - minimumTotal;

      while (remaining > 0) {
        let indexOfSmallest = 0;
        for (let i = 1; i < gaps.length; i++) {
          if (gaps[i] < gaps[indexOfSmallest]) indexOfSmallest = i;
        }
        gaps[indexOfSmallest] += 1;
        remaining -= 1;
      }

      return gaps;
    }

    function validCutoffs(cutoffs) {
      const orderedCutoffs = [
        cutoffs["A+"], cutoffs["A"], cutoffs["A-"],
        cutoffs["B+"], cutoffs["B"], cutoffs["B-"],
        cutoffs["C+"], cutoffs["C"], cutoffs["D+"], cutoffs["D"]
      ];

      if (cutoffs["D"] < 30) return false;
      if (orderedCutoffs.some(value => !Number.isInteger(value) || value < 0 || value > 100)) return false;

      for (let i = 0; i < orderedCutoffs.length - 1; i++) {
        if (orderedCutoffs[i] - orderedCutoffs[i + 1] < 3) return false;
      }

      return true;
    }

    function classify(score, cutoffs) {
      if (score >= cutoffs["A+"]) return "A+";
      if (score >= cutoffs["A"]) return "A";
      if (score >= cutoffs["A-"]) return "A-";
      if (score >= cutoffs["B+"]) return "B+";
      if (score >= cutoffs["B"]) return "B";
      if (score >= cutoffs["B-"]) return "B-";
      if (score >= cutoffs["C+"]) return "C+";
      if (score >= cutoffs["C"]) return "C";
      if (score >= cutoffs["D+"]) return "D+";
      if (score >= cutoffs["D"]) return "D";
      return "F";
    }

    function gradeCounts(scores, cutoffs) {
      const counts = Object.fromEntries(gradeOrder.map(grade => [grade, 0]));
      for (const score of scores) counts[classify(score, cutoffs)] += 1;
      return counts;
    }

    function gradeRange(grade, cutoffs) {
      switch (grade) {
        case "A+": return `≥ ${cutoffs["A+"]}`;
        case "A": return `${cutoffs["A"]} to < ${cutoffs["A+"]}`;
        case "A-": return `${cutoffs["A-"]} to < ${cutoffs["A"]}`;
        case "B+": return `${cutoffs["B+"]} to < ${cutoffs["A-"]}`;
        case "B": return `${cutoffs["B"]} to < ${cutoffs["B+"]}`;
        case "B-": return `${cutoffs["B-"]} to < ${cutoffs["B"]}`;
        case "C+": return `${cutoffs["C+"]} to < ${cutoffs["B-"]}`;
        case "C": return `${cutoffs["C"]} to < ${cutoffs["C+"]}`;
        case "D+": return `${cutoffs["D+"]} to < ${cutoffs["C"]}`;
        case "D": return `${cutoffs["D"]} to < ${cutoffs["D+"]}`;
        case "F": return `< ${cutoffs["D"]}`;
        default: return "";
      }
    }

    function renderSolution(scores, courseType, solution) {
      const result = document.getElementById("result");
      const { cutoffs, counts, percentages } = solution;
      const perGradeCounts = gradeCounts(scores, cutoffs);
      const n = scores.length;

      const cutoffRows = gradeOrder.map(grade => {
        const cutoff = grade === "F" ? "—" : cutoffs[grade];
        return `
          <tr>
            <td><strong>${grade}</strong></td>
            <td>${cutoff}</td>
            <td>${gradeRange(grade, cutoffs)}</td>
            <td>${perGradeCounts[grade]}</td>
            <td>${formatPercent(percent(perGradeCounts[grade], n))}</td>
          </tr>
        `;
      }).join("");

      result.innerHTML = `
        <div class="notice ok">
          <strong>Feasible cutoffs found for ${escapeHtml(courseType)}.</strong>
          The cutoffs are integer-valued, D is at least 30, and each consecutive cutoff differs by at least 3 marks.
        </div>

        <div class="summary-grid">
          <div class="summary-box">
            <div>A group: A+, A, A−</div>
            <div class="big">${counts.aCount}/${n} = ${formatPercent(percentages.aPct)}</div>
            <div>Required: 25% to 45%</div>
          </div>
          <div class="summary-box">
            <div>B group: B+, B, B−</div>
            <div class="big">${counts.bCount}/${n} = ${formatPercent(percentages.bPct)}</div>
            <div>Required: 40% to 75%</div>
          </div>
          <div class="summary-box">
            <div>Lower group: C+ to F</div>
            <div class="big">${counts.lowerCount}/${n} = ${formatPercent(percentages.lowerPct)}</div>
            <div>Required: 0% to 15%</div>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Grade</th>
              <th>Cutoff mark</th>
              <th>Score range</th>
              <th>Count</th>
              <th>Percent</th>
            </tr>
          </thead>
          <tbody>${cutoffRows}</tbody>
        </table>
      `;
    }

    function renderImpossible(scores, courseType) {
      const result = document.getElementById("result");
      const n = scores.length;
      const aRange = countRange(n, 25, 45);
      const bRange = countRange(n, 40, 75);
      const lowerRange = countRange(n, 0, 15);

      result.innerHTML = `
        <div class="notice bad">
          <strong>Impossible for ${escapeHtml(courseType)}.</strong>
          No integer-valued cutoffs from 0 to 100 satisfy all of the percentage, D-cutoff, and 3-mark spacing constraints for these scores.
        </div>
        <div class="notice warn">
          With ${n} score${n === 1 ? "" : "s"}, the required count ranges are:<br>
          A+, A, A−: <code>${aRange[0]}</code> to <code>${aRange[1]}</code> student${aRange[1] === 1 ? "" : "s"};
          B+, B, B−: <code>${bRange[0]}</code> to <code>${bRange[1]}</code> student${bRange[1] === 1 ? "" : "s"};
          C+, C, D+, D, F: <code>${lowerRange[0]}</code> to <code>${lowerRange[1]}</code> student${lowerRange[1] === 1 ? "" : "s"}.
        </div>
      `;
    }

    function withinPercent(count, total, low, high) {
      return count * 100 >= low * total && count * 100 <= high * total;
    }

    function countRange(total, low, high) {
      return [
        Math.ceil((low * total) / 100),
        Math.floor((high * total) / 100)
      ];
    }

    function percent(count, total) {
      return total === 0 ? 0 : (count * 100) / total;
    }

    function formatPercent(value) {
      return `${value.toFixed(1)}%`;
    }

    function showError(message) {
      document.getElementById("result").innerHTML = `<div class="notice bad"><strong>Error:</strong> ${message}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
